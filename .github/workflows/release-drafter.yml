name: Release Drafter

on:
  push:
    branches:
      - main

permissions: {}

jobs:
  release-drafter:
    name: Release Drafter
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 🏃 Run Release Drafter
        uses: release-drafter/release-drafter@563bf132657a13ded0b01fcb723c5a58cdd824e2  # v7.2.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
