name: Release Drafter

on:
  push:
    branches:
      - main

permissions: {}

jobs:
  release-drafter:
    name: Release Drafter
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 🏃 Run Release Drafter
        uses: release-drafter/release-drafter@4d75298e00d9e34c483e5ff8c68d0ea1c1940c1e  # v7.5.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
