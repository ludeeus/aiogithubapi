name: Release Drafter

on:
  push:
    branches:
      - main

permissions: {}

jobs:
  release-drafter:
    name: Release Drafter
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 🏃 Run Release Drafter
        uses: release-drafter/release-drafter@c2e2804cc59f45f57076a99af580d0fedb697927  # v7.3.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
