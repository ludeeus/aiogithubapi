name: Release Drafter

on:
  push:
    branches:
      - main

permissions: {}

jobs:
  release-drafter:
    name: Release Drafter
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 🏃 Run Release Drafter
        uses: release-drafter/release-drafter@6a93d829887aa2e0748befe2e808c66c0ec6e4c7  # v6.4.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
