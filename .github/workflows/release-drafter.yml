name: Release Drafter

on:
  push:
    branches:
      - main

permissions: {}

jobs:
  release-drafter:
    name: Release Drafter
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 🏃 Run Release Drafter
        uses: release-drafter/release-drafter@3a7fb5c85b80b1dda66e1ccb94009adbbd32fce3  # v7.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
